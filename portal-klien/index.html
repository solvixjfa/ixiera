<!DOCTYPE html>
<html lang="en">
  <head>
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>Client Portal - Dashboard</title>
    <meta content="width=device-width, initial-scale=1.0, shrink-to-fit=no" name="viewport"/>
    <!-- [PERBAIKAN] Semua path diawali dengan '/' agar menjadi absolut -->
    <link rel="icon" href="/assets/img/kaiadmin/favicon.ico" type="image/x-icon"/>
    <script src="https://ajax.googleapis.com/ajax/libs/webfont/1.6.26/webfont.js"></script>
    <script>
      WebFont.load({
        google: { families: ["Public Sans:300,400,500,600,700"] },
        custom: {
          families: ["Font Awesome 5 Solid", "Font Awesome 5 Regular", "Font Awesome 5 Brands", "simple-line-icons"],
          urls: ["/assets/css/fonts.min.css"], // Path diperbaiki
        },
        active: function () { sessionStorage.fonts = true; },
      });
    </script>
    <link rel="stylesheet" href="/assets/css/bootstrap.min.css" />
    <link rel="stylesheet" href="/assets/css/plugins.min.css" />
    <link rel="stylesheet" href="/assets/css/kaiadmin.min.css" />
    <link rel="stylesheet" href="/assets/css/custom.css" />
  </head>
  <body>
    <div class="wrapper">
      
      <!-- Placeholder: Sidebar akan dimuat di sini oleh main.js -->
      <div id="sidebar-placeholder"></div>

      <div class="main-panel">
        
        <!-- Placeholder: Topbar akan dimuat di sini oleh main.js -->
        <div id="topbar-placeholder"></div>

        <!-- ====== KONTEN UNIK UNTUK HALAMAN DASHBOARD ====== -->
        <div class="container">
          <div class="page-inner">
            <div class="d-flex align-items-left align-items-md-center flex-column flex-md-row pt-2 pb-4">
              <div>
                <h3 class="fw-bold mb-3">My Dashboard</h3>
                <h6 class="op-7 mb-2">Welcome back! Here's the progress on your orders.</h6>
              </div>
            </div>
            <div class="row">
              <!-- Kartu Statistik -->
              <div class="col-sm-6 col-md-4">
                <div class="card card-stats card-round">
                  <div class="card-body"><div class="row align-items-center"><div class="col-icon"><div class="icon-big text-center icon-warning bubble-shadow-small"><i class="fas fa-tasks"></i></div></div><div class="col col-stats ms-3 ms-sm-0"><div class="numbers"><p class="card-category">Orders In Progress</p><h4 class="card-title" id="stats-in-progress">0</h4></div></div></div></div>
                </div>
              </div>
              <div class="col-sm-6 col-md-4">
                <div class="card card-stats card-round">
                   <div class="card-body"><div class="row align-items-center"><div class="col-icon"><div class="icon-big text-center icon-success bubble-shadow-small"><i class="fas fa-check-circle"></i></div></div><div class="col col-stats ms-3 ms-sm-0"><div class="numbers"><p class="card-category">Completed Orders</p><h4 class="card-title" id="stats-completed">0</h4></div></div></div></div>
                </div>
              </div>
              <div class="col-sm-6 col-md-4">
                 <div class="card card-stats card-round">
                   <div class="card-body"><div class="row align-items-center"><div class="col-icon"><div class="icon-big text-center icon-info bubble-shadow-small"><i class="fas fa-dollar-sign"></i></div></div><div class="col col-stats ms-3 ms-sm-0"><div class="numbers"><p class="card-category">Total Spent</p><h4 class="card-title" id="stats-total-spent">$0.00</h4></div></div></div></div>
                </div>
              </div>
            </div>
            <!-- Tabel Order -->
            <div class="row">
              <div class="col-md-12">
                <div class="card card-round">
                  <div class="card-header"><div class="card-head-row"><div class="card-title">Order Progress Tracking</div></div></div>
                  <div class="card-body"><div class="table-responsive"><table class="table table-hover align-middle"><thead><tr><th scope="col">Product</th><th scope="col" style="width: 40%;">Progress</th><th scope="col" class="text-center">Downloads</th></tr></thead><tbody id="orders-tracking-table"></tbody></table></div><div id="empty-orders-message" class="text-center p-5" style="display: none;"><i class="fas fa-box-open fa-3x text-muted mb-3"></i><h4>No Active Orders Found</h4><p class="text-muted">You can find new products to order from the "New Products" page.</p><a href="/products.html" class="btn btn-primary mt-2">Browse Products</a></div></div>
                </div>
              </div>
            </div>
          </div>
        </div>
        <!-- ====== AKHIR DARI KONTEN UNIK ====== -->

        <!-- Placeholder: Footer akan dimuat di sini oleh main.js -->
        <footer class="footer" id="footer-placeholder"></footer>
      </div>
    </div>

    <!-- Elemen spesifik untuk halaman ini -->
    <template id="order-row-template"> ... </template>
    <div id="loadingSpinner" class="loading-spinner"> ... </div>

    <!-- [PERBAIKAN] Semua path skrip diawali dengan '/' -->
    <script src="/assets/js/core/jquery-3.7.1.min.js"></script>
    <script src="/assets/js/core/popper.min.js"></script>
    <script src="/assets/js/core/bootstrap.min.js"></script>
    <script src="/assets/js/plugin/jquery-scrollbar/jquery.scrollbar.min.js"></script>
    <script src="/assets/js/plugin/bootstrap-notify/bootstrap-notify.min.js"></script>
    <script src="/assets/js/kaiadmin.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/assets/js/supabase-client.js"></script>
    <script src="/assets/js/dashboard.js"></script>
    
    <!-- [PENTING] Panggil skrip pemuat universal di paling akhir -->
    <script src="/assets/js/main.js"></script>
  </body>
</html>
