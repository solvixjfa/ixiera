<!DOCTYPE html>
<html lang="en">
<head>
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>Login - Portal Klien</title>
    <meta content="width=device-width, initial-scale=1.0, shrink-to-fit=no" name="viewport" />
    <link rel="icon" href="assets/img/kaiadmin/favicon.ico" type="image/x-icon" />
    <link rel="stylesheet" href="assets/css/bootstrap.min.css" />
    <link rel="stylesheet" href="assets/css/kaiadmin.min.css" />
    <style>
        body { background-color: #f4f5f8; }
        .login-container { display: flex; justify-content: center; align-items: center; height: 100vh; }
        .login-card { width: 100%; max-width: 400px; }
    </style>
</head>
<body>
    <div class="container login-container">
        <div class="card login-card shadow-lg text-center">
            <div class="card-body p-5">
                <h3 class="fw-bold">Portal Klien</h3>
                <p class="text-muted mt-2 mb-4">Klik untuk masuk dan melihat dashboard Anda.</p>
                <div class="d-grid">
                    <button id="login-btn" class="btn btn-primary btn-lg">
                        <span class="spinner-border spinner-border-sm d-none" role="status" aria-hidden="true"></span>
                        Masuk ke Portal
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase SDKs (Versi CDN "compat") -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    
    <script>
        // Konfigurasi Firebase Anda
        const firebaseConfig = {
          apiKey: "AIzaSyDNa4tmSIK26we17vT7Qb8uenLY5QVRYPI",
          authDomain: "ixiera-core.firebaseapp.com",
          projectId: "ixiera-core",
          storageBucket: "ixiera-core.firebasestorage.app",
          messagingSenderId: "637819618265",
          appId: "1:637819618265:web:c056d7fe5bcfa481734fc8",
          measurementId: "G-YM6VE79GGG"
        };

        // Inisialisasi Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        const loginButton = document.getElementById('login-btn');
        const spinner = loginButton.querySelector('.spinner-border');

        // Cek apakah pengguna sudah pernah login sebelumnya
        auth.onAuthStateChanged(user => {
            if (user) {
                // Jika ya, langsung arahkan ke dashboard
                window.location.href = 'index.html';
            }
        });

        // Saat tombol di-klik
        loginButton.addEventListener('click', () => {
            spinner.classList.remove('d-none');
            loginButton.disabled = true;

            // Loginkan pengguna secara anonim
            auth.signInAnonymously()
                .then(() => {
                    // Jika berhasil, onAuthStateChanged di atas akan otomatis
                    // mengarahkan ke index.html
                })
                .catch((error) => {
                    console.error("Gagal login anonim:", error);
                    alert('Gagal masuk. Coba lagi.');
                    spinner.classList.add('d-none');
                    loginButton.disabled = false;
                });
        });
    </script>
</body>
</html>
